version: '3.8'

services:
  jenkins:
    build: 
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: salem-jenkins
    user: root
    privileged: true
    ports:
      - "8080:8080"      # Jenkins 웹 UI 포트
      - "50000:50000"    # Jenkins 에이전트 포트
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home: